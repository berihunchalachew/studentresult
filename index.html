<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result PWA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { margin:0; font-family:sans-serif; }
.login-container { max-width:400px;margin:100px auto;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.btn-gradient { background: linear-gradient(90deg,#4b6cb7,#182848); color:#fff; border:none; }
</style>
</head>

<body>

<div class="login-container">
  <h3 class="text-center mb-4">Student Login</h3>

  <input id="studentId" class="form-control mb-2" placeholder="Student ID">
  <input id="password" type="password" class="form-control mb-2" placeholder="Password">

  <select id="sheet" class="form-select mb-3">
    <option value="">Loading...</option>
  </select>

  <div id="msg" class="text-danger mb-2"></div>

  <button onclick="login()" class="btn btn-gradient w-100">Login</button>
</div>

<div class="container mt-5 hidden" id="dashboard">
  <h3 id="welcome"></h3>

  <table class="table table-bordered mt-3" id="resultTable">
    <thead></thead>
    <tbody></tbody>
  </table>

  <button onclick="logout()" class="btn btn-danger">Logout</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwAYLv1xkmO9CNvG_eJRO6W4YaCIjHUm_2PdoboiDURThODpa1bb0S0EVRYjeDiyRX_/exec";

// ---------- LOAD SHEETS ----------
async function loadSheets() {
  const res = await fetch(WEB_APP_URL + "?getSheets=true");
  const data = await res.json();

  const select = document.getElementById("sheet");
  select.innerHTML = '<option value="">Select Course</option>';

  data.sheets.forEach(s => {
    let opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    select.appendChild(opt);
  });
}

// ---------- LOGIN ----------
async function login() {
  const id = studentId.value;
  const password = document.getElementById("password").value;
  const sheet = document.getElementById("sheet").value;

  if (!id || !password || !sheet) {
    msg.textContent = "All fields required";
    return;
  }

  const formData = new FormData();
  formData.append("id", id);
  formData.append("password", password);
  formData.append("sheet", sheet);

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.error) {
      msg.textContent = data.error;
      return;
    }

    sessionStorage.setItem("student", JSON.stringify(data.student));
    showDashboard(data.student);

  } catch (err) {
    msg.textContent = "Network / CORS error";
  }
}

// ---------- DASHBOARD ----------
function showDashboard(student) {
  document.querySelector(".login-container").style.display = "none";
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("welcome").textContent =
    "Welcome " + (student.Name || student.ID);

  const table = document.getElementById("resultTable");

  const headers = Object.keys(student);
  const thead = table.querySelector("thead");
  const tbody = table.querySelector("tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  let tr = document.createElement("tr");
  headers.forEach(h => {
    let th = document.createElement("th");
    th.textContent = h;
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  let tr2 = document.createElement("tr");
  headers.forEach(h => {
    let td = document.createElement("td");
    td.textContent = student[h];
    tr2.appendChild(td);
  });
  tbody.appendChild(tr2);
}

// ---------- LOGOUT ----------
function logout() {
  sessionStorage.clear();
  location.reload();
}

// ---------- INIT ----------
loadSheets();
</script>

</body>
</html>

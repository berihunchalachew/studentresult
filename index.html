<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result PWA</title>

<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { visibility:hidden; margin:0; font-family:sans-serif; display:flex; flex-direction:column; min-height:100vh; }
.hidden { display:none !important; }

#loader {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
  background:#fff; z-index:9999;
}
.spinner {
  width:50px;height:50px;
  border:5px solid #ddd;
  border-top:5px solid #4b6cb7;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin { 100%{ transform:rotate(360deg);} }

.login-container {
  max-width:400px;
  margin:80px auto;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  background:#fff;
}

.btn-gradient {
  background: linear-gradient(90deg, #4b6cb7, #182848);
  color:#fff;
  border:none;
}

.navbar-custom {
  background: linear-gradient(90deg,#4b6cb7,#182848);
}

.footer {
  text-align:center;
  margin-top:auto;
  padding:10px;
  background:#f1f1f1;
}
</style>

</head>

<body>

<!-- LOADER -->

<div id="loader"><div class="spinner"></div></div>

<!-- LOGIN -->

<div id="loginPage" class="hidden flex-grow-1">
  <div class="login-container">
    <h3 class="text-center mb-4">Student Login</h3>

```
<input id="studentId" class="form-control mb-2" placeholder="Student ID">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<select id="sheet" class="form-select mb-3"></select>

<div id="loginMsg" class="text-danger mb-2"></div>

<button class="btn btn-gradient w-100" onclick="login()">Login</button>
```

  </div>
</div>

<!-- CHANGE PASSWORD -->

<div id="changePage" class="container mt-5 hidden">
  <h3 class="text-center mb-3">Change Password</h3>

  <div class="row justify-content-center">
    <div class="col-md-5">

```
  <input id="newPass" type="password" class="form-control mb-2" placeholder="New Password">
  <input id="confirmPass" type="password" class="form-control mb-2" placeholder="Confirm Password">

  <div id="passMsg" class="text-danger mb-2"></div>

  <button class="btn btn-gradient w-100" onclick="changePassword()">Update Password</button>

</div>
```

  </div>
</div>

<!-- DASHBOARD -->

<div id="dashboardPage" class="hidden flex-grow-1">

  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
      <span class="navbar-brand text-white">Student Portal</span>
      <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container mt-3">
    <h5 id="welcomeMsg"></h5>

```
<button class="btn btn-primary mb-3" onclick="loadResult()">Refresh Result</button>

<div class="table-responsive">
  <table class="table table-bordered table-striped" id="resultTable"></table>
</div>
```

  </div>

</div>

<!-- FOOTER -->

<div class="footer">© 2026 Student Result System</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTmpmrEfLRb8insGshrYKYfY6u6zkUSCHUOSjtYBh2vWFxVrsJTl5QKwSSBphniD4A/exec";

// ---------- INIT ----------
document.addEventListener('DOMContentLoaded', async () => {

  const token = localStorage.getItem("token");

  if (token) {
    showDashboard();
    loadResult();
  } else {
    await loadSheets();
    showLogin();
  }

  document.body.style.visibility = 'visible';
  document.getElementById('loader').style.display = 'none';
});

// ---------- LOAD SHEETS ----------
async function loadSheets() {
  try {
    const res = await fetch(WEB_APP_URL + "?action=getSheets");
    const data = await res.json();

    const select = document.getElementById('sheet');
    select.innerHTML = '<option value="">-- Select Course --</option>';

    if (data.sheets) {
      data.sheets.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        select.appendChild(opt);
      });
    }

  } catch (err) {
    alert("Failed to load sheets");
    console.error(err);
  }
}

// ---------- LOGIN ----------
async function login() {
  const id = document.getElementById('studentId').value.trim();
  const password = document.getElementById('password').value.trim();
  const sheet = document.getElementById('sheet').value;

  const msg = document.getElementById('loginMsg');
  msg.textContent = '';

  if (!id || !password || !sheet) {
    msg.textContent = "All fields required";
    return;
  }

  try {
    const res = await fetch(`${WEB_APP_URL}?action=login&id=${id}&password=${password}&sheet=${sheet}`);
    const data = await res.json();

    if (data.error) {
      msg.textContent = data.error;
      return;
    }

    localStorage.setItem("token", data.token);

    if (data.firstLogin) {
      showChange();
    } else {
      showDashboard();
      loadResult();
    }

  } catch (err) {
    msg.textContent = "Network error";
    console.error(err);
  }
}

// ---------- LOAD RESULT ----------
async function loadResult() {
  const token = localStorage.getItem("token");

  try {
    const res = await fetch(`${WEB_APP_URL}?action=getResult&token=${token}`);
    const data = await res.json();

    if (data.error) {
      alert(data.error);
      logout();
      return;
    }

    const table = document.getElementById('resultTable');
    table.innerHTML = "";

    const headers = Object.keys(data.student);

    // Header row
    let tr = document.createElement('tr');
    headers.forEach(h => {
      let th = document.createElement('th');
      th.textContent = h;
      tr.appendChild(th);
    });
    table.appendChild(tr);

    // Data row
    let tr2 = document.createElement('tr');
    headers.forEach(h => {
      let td = document.createElement('td');
      td.textContent = data.student[h];
      tr2.appendChild(td);
    });
    table.appendChild(tr2);

    document.getElementById('welcomeMsg').textContent =
      "Welcome, " + (data.student["First Name"] || data.student.StudentID);

  } catch (err) {
    console.error(err);
  }
}

// ---------- CHANGE PASSWORD ----------
async function changePassword() {
  const newPass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const msg = document.getElementById('passMsg');
  const token = localStorage.getItem("token");

  msg.textContent = '';

  if (!newPass || !confirm) {
    msg.textContent = "All fields required";
    return;
  }

  if (newPass !== confirm) {
    msg.textContent = "Passwords do not match";
    return;
  }

  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "changePassword",
        token,
        newPassword: newPass
      })
    });

    showDashboard();
    loadResult();

  } catch (err) {
    msg.textContent = "Network error";
    console.error(err);
  }
}

// ---------- UI CONTROL ----------
function showLogin() {
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('dashboardPage').classList.add('hidden');
  document.getElementById('changePage').classList.add('hidden');
}

function showDashboard() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('changePage').classList.add('hidden');
  document.getElementById('dashboardPage').classList.remove('hidden');
}

function showChange() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('dashboardPage').classList.add('hidden');
  document.getElementById('changePage').classList.remove('hidden');
}

function logout() {
  localStorage.removeItem("token");
  showLogin();
}
</script>

</body>
</html>

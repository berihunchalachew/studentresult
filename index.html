<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDU Student Result Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#4b6cb7,#182848);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* Loader */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fff;
  z-index:9999;
}

/* Login Card */
.card-box{
  max-width:400px;
  margin:80px auto;
  padding:30px;
  border-radius:15px;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Login Icon */
.login-icon{
  width:90px;
  display:block;
  margin:0 auto 20px;
}

/* Buttons */
.btn-main{
  background:#4b6cb7;
  color:#fff;
  border:none;
}
.btn-main:hover{ background:#3a57a0; }

/* Navbar */
.navbar-custom{
  background:#182848;
}
.navbar-custom .nav-link{
  color:#fff !important;
  cursor:pointer;
}
.navbar-custom .nav-link.active{
  background:#4b6cb7;
  border-radius:5px;
}

/* Tabs */
.tab-pane{ display:none; }
.tab-active{ display:block; }

/* Footer */
.footer{
  margin-top:auto;
  text-align:center;
  padding:10px;
  background:#fff;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom">

<div class="container mt-4">

  <h5 id="welcomeMsg" class="text-white"></h5>

  <!-- HOME -->

  <div id="home" class="tab-pane tab-active text-white">
    <div class="card p-3">
      Welcome to Dire Dawa University Student Result System.

  <!-- RESULT -->

  <div id="result" class="tab-pane">

        <table class="table table-bordered table-striped" id="resultTable"></table>

      This system allows students to securely view academic results.
    </div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTmpmrEfLRb8insGshrYKYfY6u6zkUSCHUOSjtYBh2vWFxVrsJTl5QKwSSBphniD4A/exec";

// INIT
document.addEventListener('DOMContentLoaded', async ()=>{
  const student = JSON.parse(sessionStorage.getItem('student'));

  if(student){
    showDashboard(student);
  } else {
    await loadSheets();
  }

  document.getElementById('loader').style.display='none';
});

// LOAD SHEETS
async function loadSheets(){
  try{
    const res = await fetch(WEB_APP_URL,{
      method:'POST',
      body:JSON.stringify({getSheets:true})
    });

    const data = await res.json();

    const select=document.getElementById('sheet');
    select.innerHTML='<option value="">-- Select Course --</option>';

    if(data.sheets){
      data.sheets.forEach(s=>{
        let o=document.createElement('option');
        o.value=s;
        o.textContent=s;
        select.appendChild(o);
      });
    }

  }catch(e){
    alert("Failed to load sheets");
  }
}

// LOGIN
async function login(){
  const id=studentId.value.trim();
  const password=document.getElementById('password').value.trim();
  const sheet=document.getElementById('sheet').value;

  if(!id || !password || !sheet){
    loginMsg.textContent="All fields required";
    return;
  }

  const res=await fetch(WEB_APP_URL,{
    method:'POST',
    body:JSON.stringify({id,password,sheet})
  });

  const data=await res.json();

  if(data.error){
    loginMsg.textContent=data.error;
    return;
  }

  sessionStorage.setItem('student',JSON.stringify(data.student));
  showDashboard(data.student);
}

// SHOW DASHBOARD
function showDashboard(student){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('dashboardPage').classList.remove('hidden');

  welcomeMsg.textContent="Welcome, "+(student['First Name']||student.StudentID);

  loadResults(student);
}

// LOAD RESULTS
function loadResults(student){
  const table=document.getElementById('resultTable');
  table.innerHTML='';

  let tr=document.createElement('tr');
  Object.keys(student).forEach(k=>{
    let th=document.createElement('th'); th.textContent=k; tr.appendChild(th);
  });
  table.appendChild(tr);

  let tr2=document.createElement('tr');
  Object.values(student).forEach(v=>{
    let td=document.createElement('td'); td.textContent=v; tr2.appendChild(td);
  });
  table.appendChild(tr2);
}

// TAB SWITCHING
document.querySelectorAll('#tabs .nav-link').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.nav-link').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');

    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('tab-active'));
    document.getElementById(tab.dataset.tab).classList.add('tab-active');

    if(tab.dataset.tab==='result'){
      const student=JSON.parse(sessionStorage.getItem('student'));
      loadResults(student);
    }
  };
});

// LOGOUT
function logout(){
  sessionStorage.clear();
  location.reload();
}
</script>

</body>
</html>

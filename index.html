<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Result PWA</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Hide sections */
    .hidden { display: none !important; }

    /* Login container */
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      background-color: #fff;
    }

    .login-container img { display:block; margin:0 auto 20px; width:80px; height:80px; }

    /* Navbar logo */
    .navbar-brand img { height:40px; width:auto; margin-right:10px; }

    /* Buttons */
    .btn-gradient {
      background: linear-gradient(90deg, #4b6cb7, #182848);
      color:#fff;
      border:none;
      transition:.3s;
    }
    .btn-gradient:hover { opacity:.9; }

    .navbar-custom {
      background: linear-gradient(90deg, #4b6cb7, #182848);
    }
    .navbar-custom .nav-link { color:#fff !important; margin-right:10px; }
    .navbar-custom .nav-link.active { background-color: rgba(255,255,255,0.2); border-radius:5px; }

    /* Footer */
    .footer { text-align:center; margin:30px 0; font-size:.9rem; color:#555; }

    @media(max-width:576px) { .login-container { margin:50px 20px; padding:20px; } }
    .navbar-toggler { border-color: rgba(255,255,255,0.5); }
    .navbar-toggler-icon { filter: invert(1); }

    html,body { height:100%; margin:0; display:flex; flex-direction:column; }
    #loginPage, #changePasswordPage, #dashboardPage { flex:1; }
    .footer { margin-top:auto; padding:15px 0; background-color:#f8f9fa; width:100%; }
    body { visibility:hidden; }

    /* Loader */
    #loader {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:white; display:flex; justify-content:center; align-items:center; z-index:9999;
    }
    .spinner {
      width:50px; height:50px; border:5px solid #ddd;
      border-top:5px solid #4b6cb7; border-radius:50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner"></div></div>

  <!-- Login Page -->
  <div id="loginPage" class="hidden flex-grow-1">
    <div class="login-container">
      <img src="./login.png" alt="Login Icon">
      <h3 class="text-center mb-4">Student Login</h3>
      <div class="mb-3">
        <label>Student ID</label>
        <input type="text" id="studentId" class="form-control">
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control">
      </div>
      <div class="mb-3">
        <label>Select course code / section</label>
        <select id="sheet" class="form-select">
          <option value="">-- Select --</option>
        </select>
      </div>
      <div id="loginMsg" class="text-danger mb-3"></div>
      <button onclick="login()" class="btn btn-gradient w-100">Login</button>
    </div>
  </div>

  <!-- Change Password -->
  <div id="changePasswordPage" class="container mt-5 hidden">
    <h2 class="text-center mb-4">Change Password</h2>
    <div class="row justify-content-center">
      <div class="col-12 col-md-6">
        <div class="mb-3">
          <label>New Password</label>
          <input type="password" id="newPassword" class="form-control">
        </div>
        <div class="mb-3">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control">
        </div>
        <div id="passwordMsg" class="text-danger mb-3"></div>
        <button onclick="changePassword()" class="btn btn-gradient w-100">Update Password</button>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboardPage" class="hidden flex-grow-1">
    <nav class="navbar navbar-expand-lg navbar-custom mb-4">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="./diredawa-university.png" alt="DDU Logo">
          <span>Student Portal</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto" id="dashboardTabs">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#homeTab">Home</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#viewResultTab">View Result</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#aboutTab">About</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#contactTab">Contact</button></li>
            <li class="nav-item"><button class="nav-link btn-gradient text-white ms-2" onclick="logout()">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <h4 id="welcomeMsg" class="mb-4"></h4>
      <div class="tab-content">
        <div class="tab-pane fade show active" id="homeTab">Welcome to the Student Result Portal.</div>
        <div class="tab-pane fade" id="viewResultTab">
          <div class="table-responsive">
            <table class="table table-bordered table-striped table-sm" id="resultTable">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div class="tab-pane fade" id="aboutTab">This is the Student Result Portal for multiple courses.</div>
        <div class="tab-pane fade" id="contactTab">Contact: berihun.chalachew@ddu.edu.et</div>
      </div>
    </div>
  </div>

  <div class="footer">&copy; 2026 Dire Dawa University - Student Result PWA</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxVzCovZ6sNQNd2DfCN-uws7eIRObB5kh4DZhorUo59v2-aeLiI29YMvkO-Lhtpyglr/exec";

    // Populate sheets from Web App
    async function populateSheets() {
  const select = document.getElementById("sheet");
  select.innerHTML = '<option value="">-- Select --</option>';

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ getSheets: true })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    if (data.error) {
      console.error("Failed to fetch sheets:", data.error);
      alert("Unable to load sheet list. Check Web App URL.");
      return;
    }

    if (data.sheets && Array.isArray(data.sheets) && data.sheets.length > 0) {
      // Populate dropdown with actual sheets
      data.sheets.forEach(sheet => {
        const option = document.createElement("option");
        option.value = sheet;
        option.text = sheet;
        select.appendChild(option);
      });
    } else {
      console.warn("No sheets found in the spreadsheet.");
      alert("No sheets found. Please check your spreadsheet.");
    }

  } catch (err) {
    console.error("Fetch failed:", err);
    alert("Failed to fetch sheets. Check network and Web App URL.");
  }
}

    // Login / Change Password / Dashboard
    async function login() {
      const id = document.getElementById("studentId").value.trim();
      const password = document.getElementById("password").value.trim();
      const sheet = document.getElementById("sheet").value;
      const msg = document.getElementById("loginMsg");
      msg.innerText = "";
      if (!id || !password || !sheet) { msg.innerText = "Fill all fields!"; return; }

      try {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, password, sheet })
        });
        const data = await res.json();
        if (data.error) { msg.innerText = data.error; return; }

        const firstLogin = data.firstLogin===true || data.firstLogin==="true";
        localStorage.setItem("student", JSON.stringify(data.student));
        localStorage.setItem("sheet", sheet);
        localStorage.setItem("firstLogin", firstLogin);

        if (firstLogin) {
          document.getElementById("loginPage").classList.add("hidden");
          document.getElementById("changePasswordPage").classList.remove("hidden");
        } else {
          showDashboard();
        }
      } catch(err) { console.error(err); msg.innerText="Network error!"; }
    }

    async function changePassword() {
      const newPass = document.getElementById("newPassword").value.trim();
      const confirmPass = document.getElementById("confirmPassword").value.trim();
      const msg = document.getElementById("passwordMsg");
      if (!newPass || !confirmPass) { msg.innerText="Enter both fields."; return; }
      if (newPass !== confirmPass) { msg.innerText="Passwords do not match."; return; }

      const student = JSON.parse(localStorage.getItem("student"));
      const sheet = localStorage.getItem("sheet");

      try {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: student.StudentID, password: student.Password, sheet, newPassword: newPass })
        });
        const data = await res.json();
        if (data.error){ msg.innerText=data.error; return; }

        student.Password = newPass;
        localStorage.setItem("student", JSON.stringify(student));
        localStorage.setItem("firstLogin", false);
        showDashboard();
      } catch(err){ console.error(err); msg.innerText="Password update failed."; }
    }

    function showDashboard() {
      const student = JSON.parse(localStorage.getItem("student"));
      if (!student) return;
      document.getElementById("welcomeMsg").innerText = `Welcome, ${student.FirstName||""} ${student.FatherName||""}`;
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("changePasswordPage").classList.add("hidden");
      document.getElementById("dashboardPage").classList.remove("hidden");
    }

    function loadResultTable() {
      const student = JSON.parse(localStorage.getItem("student"));
      if (!student) return;

      const tbody = document.querySelector("#resultTable tbody");
      const thead = document.querySelector("#resultTable thead");
      tbody.innerHTML = ""; thead.innerHTML = "";

      const excludedFields = ["Password"];
      const headers = Object.keys(student).filter(h => !excludedFields.includes(h));

      let headerRow = "<tr>";
      headers.forEach(h => headerRow += `<th>${h}</th>`);
      headerRow += "</tr>";
      thead.innerHTML = headerRow;

      let row = "<tr>";
      headers.forEach(h => row += `<td>${student[h]}</td>`);
      row += "</tr>";
      tbody.innerHTML = row;
    }

    function logout() {
      localStorage.clear();
      document.getElementById("studentId").value="";
      document.getElementById("password").value="";
      document.getElementById("sheet").value="";
      document.getElementById("loginPage").classList.remove("hidden");
      document.getElementById("changePasswordPage").classList.add("hidden");
      document.getElementById("dashboardPage").classList.add("hidden");
    }

    async function refreshStudentData() {
      const student = JSON.parse(localStorage.getItem("student"));
      const sheet = localStorage.getItem("sheet");
      if (!student || !sheet) return;

      try {
        const res = await fetch(WEB_APP_URL, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ id:student.StudentID, password:student.Password, sheet })
        });
        const data = await res.json();
        if(!data.error){ localStorage.setItem("student", JSON.stringify(data.student)); }
      } catch(err){ console.error("Refresh failed", err); }
    }

    window.onload = async function() {
      await populateSheets();

      const student = JSON.parse(localStorage.getItem("student"));
      const firstLogin = localStorage.getItem("firstLogin") === "true";

      if (student) {
        if(firstLogin){ document.getElementById("changePasswordPage").classList.remove("hidden"); }
        else { showDashboard(); }
      } else { document.getElementById("loginPage").classList.remove("hidden"); }

      const tabContainer = document.getElementById("dashboardTabs");
      if(tabContainer){
        tabContainer.addEventListener('shown.bs.tab', e=>{
          if(e.target.getAttribute("data-bs-target")==="#viewResultTab"){ loadResultTable(); }
        });
      }

      document.getElementById("loader").style.display="none";
      document.body.style.visibility="visible";

      setInterval(async ()=>{
        if(!document.hidden){
          await refreshStudentData();
          const activeTab = document.querySelector(".nav-link.active");
          if(activeTab && activeTab.getAttribute("data-bs-target")==="#viewResultTab"){ loadResultTable(); }
        }
      },10000);
    };

    if('serviceWorker' in navigator){ navigator.serviceWorker.register('./service-worker.js'); }
 </script>
  
  <script>
(async () => {
  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbxVzCovZ6sNQNd2DfCN-uws7eIRObB5kh4DZhorUo59v2-aeLiI29YMvkO-Lhtpyglr/exec", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ getSheets: true })
    });
    const data = await res.json();
    console.log("Sheets from Web App:", data);
  } catch (err) {
    console.error("Fetch failed:", err);
  }
})();
</script>
</body>
</html>

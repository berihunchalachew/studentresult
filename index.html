<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDU Student Result Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#4b6cb7,#182848);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.hidden{ display:none !important; }

.login-box{
  max-width:400px;
  margin:80px auto;
  padding:30px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.navbar-custom{ background:#182848; }
.navbar-custom .nav-link{ color:#fff !important; cursor:pointer; }
.navbar-custom .nav-link.active{ background:#4b6cb7; border-radius:5px; }

.tab-pane{ display:none; }
.tab-active{ display:block; }

.footer{
  text-align:center;
  padding:10px;
  background:#fff;
  margin-top:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
  <h4 class="text-center">Student Login</h4>
  <input id="studentId" class="form-control mt-3" placeholder="Student ID">
  <input id="password" type="password" class="form-control mt-2" placeholder="Password">
  <select id="sheet" class="form-select mt-2"></select>
  <div id="loginMsg" class="text-danger mt-2"></div>
  <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
</div>

<!-- CHANGE PASSWORD -->
<div id="changePage" class="login-box hidden">
  <h4 class="text-center">Change Password</h4>
  <input id="currentPassword" type="password" class="form-control mt-2" placeholder="Current Password">
  <input id="newPassword" type="password" class="form-control mt-2" placeholder="New Password">
  <input id="confirmPassword" type="password" class="form-control mt-2" placeholder="Confirm Password">
  <div id="passMsg" class="text-danger mt-2"></div>
  <button class="btn btn-success w-100 mt-3" onclick="changePassword()">Update Password</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <span class="text-white"><strong>DDU Student Portal</strong></span>
    <ul class="navbar-nav ms-auto" id="tabs">
      <li class="nav-item"><span class="nav-link active" data-tab="home">Home</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="result">Result</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="about">About</span></li>
      <li class="nav-item"><button class="btn btn-light btn-sm ms-2" onclick="logout()">Logout</button></li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
  <h5 id="welcomeMsg" class="text-white mb-3"></h5>

  <div id="home" class="tab-pane tab-active text-white">
    <div class="card p-3">Welcome to Student Result System</div>
  </div>

  <div id="result" class="tab-pane">
    <div class="card p-3 table-responsive">
      <table class="table table-bordered table-striped text-white" id="resultTable"></table>
    </div>
  </div>

  <div id="about" class="tab-pane text-white">
    <div class="card p-3">This portal allows students to view results securely.</div>
  </div>

</div>
</div>

<div class="footer">© 2026 Dire Dawa University</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxt8PpQDQF_f7sBUIBtmMOqOJgq7lr1keqW0wQ4HjVh211Ktq1OhsOIYpHFrVIZTpUH/exec";

// INIT
document.addEventListener('DOMContentLoaded', async ()=>{
  const session = JSON.parse(sessionStorage.getItem('session'));

  if(session){
    await fetchStudent(session);
  }else{
    await loadSheets();
  }
});

// LOAD SHEETS
async function loadSheets(){
  try{
    const res = await fetch(WEB_APP_URL,{
      method:'POST',
      body:JSON.stringify({getSheets:true})
    });

    const data = await res.json();
    const select = document.getElementById('sheet');

    select.innerHTML = '<option value="">Select Course</option>';

    if(data.sheets){
      data.sheets.forEach(s=>{
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        select.appendChild(opt);
      });
    }
  }catch(e){
    loginMsg.textContent = "Failed to load courses";
  }
}

// LOGIN
async function login(){
  const id = studentId.value.trim();
  const password = document.getElementById('password').value.trim();
  const sheet = document.getElementById('sheet').value;

  if(!id || !password || !sheet){
    loginMsg.textContent = "All fields required";
    return;
  }

  const res = await fetch(WEB_APP_URL,{
    method:'POST',
    body:JSON.stringify({action:'login',id,password,sheet})
  });

  const data = await res.json();

  if(data.error){
    loginMsg.textContent = data.error;
    return;
  }

  sessionStorage.setItem('session', JSON.stringify({id,sheet}));

  if(data.firstLogin){
    showChange();
  }else{
    showDashboard(data.student);
  }
}

// FETCH STUDENT (ALWAYS FRESH)
async function fetchStudent(session){
  const res = await fetch(WEB_APP_URL,{
    method:'POST',
    body:JSON.stringify({
      action:'getStudent',
      id:session.id,
      sheet:session.sheet
    })
  });

  const data = await res.json();

  if(data.error){
    logout();
    return;
  }

  showDashboard(data.student);
}

// SHOW DASHBOARD
function showDashboard(student){
  loginPage.classList.add('hidden');
  changePage.classList.add('hidden');
  dashboardPage.classList.remove('hidden');

  const name = student["First Name"] || student["Student ID"];
  welcomeMsg.textContent = "Welcome, " + name;

  loadResults(student);
}

// LOAD RESULTS
function loadResults(student){
  const table = document.getElementById('resultTable');
  table.innerHTML = '';

  const keys = Object.keys(student).filter(k =>
    k.toLowerCase().replace(/\s+/g,'') !== "password"
  );

  const trHead = document.createElement('tr');
  keys.forEach(k=>{
    const th = document.createElement('th');
    th.textContent = k;
    trHead.appendChild(th);
  });

  table.appendChild(trHead);

  const tr = document.createElement('tr');
  keys.forEach(k=>{
    const td = document.createElement('td');
    td.textContent = student[k] || "-";
    tr.appendChild(td);
  });

  table.appendChild(tr);
}

// CHANGE PASSWORD
async function changePassword(){
  const current = currentPassword.value;
  const newP = newPassword.value;
  const conf = confirmPassword.value;

  const session = JSON.parse(sessionStorage.getItem('session'));

  if(newP !== conf){
    passMsg.textContent = "Passwords do not match";
    return;
  }

  const res = await fetch(WEB_APP_URL,{
    method:'POST',
    body:JSON.stringify({
      action:'changePassword',
      id:session.id,
      sheet:session.sheet,
      currentPassword:current,
      newPassword:newP
    })
  });

  const data = await res.json();

  if(data.error){
    passMsg.textContent = data.error;
    return;
  }

  alert("Password updated");
  fetchStudent(session);
}

// TAB SWITCH
document.querySelectorAll('#tabs .nav-link').forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll('.nav-link').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');

    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('tab-active'));
    document.getElementById(tab.dataset.tab).classList.add('tab-active');

    if(tab.dataset.tab === "result"){
      const session = JSON.parse(sessionStorage.getItem('session'));
      fetchStudent(session);
    }
  };
});

// SHOW CHANGE PAGE
function showChange(){
  loginPage.classList.add('hidden');
  changePage.classList.remove('hidden');
}

// LOGOUT
function logout(){
  sessionStorage.clear();
  location.reload();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDU Student Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
#loginPage, #changePage, #dashboardPage { display:none; }

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#4b6cb7,#182848);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.login-box{
  max-width:400px;
  margin:80px auto;
  padding:30px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.navbar-custom{ background:#182848; }
.navbar-custom .nav-link{ color:#fff !important; cursor:pointer; }
.navbar-custom .nav-link.active{ background:#4b6cb7; border-radius:5px; }

.tab-pane{ display:none; }
.tab-active{ display:block; }

.footer{
  text-align:center;
  padding:10px;
  background:#fff;
  margin-top:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
  <h4 class="text-center">Student Login</h4>

  <input id="studentId" class="form-control mt-3" placeholder="Student ID">
  <input id="password" type="password" class="form-control mt-2" placeholder="Password">

  <select id="sheet" class="form-select mt-2"></select>

  <div id="loginMsg" class="text-danger mt-2"></div>

  <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
</div>

<!-- CHANGE PASSWORD -->
<div id="changePage" class="login-box">
  <h4 class="text-center">Change Password</h4>

  <input id="oldPassword" type="password" class="form-control mt-3" placeholder="Current Password">
  <input id="newPassword" type="password" class="form-control mt-2" placeholder="New Password">
  <input id="confirmPassword" type="password" class="form-control mt-2" placeholder="Confirm Password">

  <div id="passMsg" class="text-danger mt-2"></div>

  <button class="btn btn-success w-100 mt-3" onclick="changePassword()">Update Password</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage">

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <div class="text-white">
      <strong>DDU Student Portal</strong>
    </div>

    <ul class="navbar-nav ms-auto" id="tabs">
      <li class="nav-item"><span class="nav-link active" data-tab="home">Home</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="result">Result</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="about">About</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="contact">Contact</span></li>
      <li class="nav-item">
        <button class="btn btn-light btn-sm ms-2" onclick="logout()">Logout</button>
      </li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
  <h5 id="welcomeMsg" class="text-white"></h5>

  <div id="home" class="tab-pane tab-active text-white">
    <div class="card p-3">Welcome to Student Portal</div>
  </div>

  <div id="result" class="tab-pane">
    <div class="card p-3 table-responsive">
      <table class="table table-bordered table-striped text-white" id="resultTable"></table>
    </div>
  </div>

  <div id="about" class="tab-pane">
    <div class="card p-3">University Result System</div>
  </div>

  <div id="contact" class="tab-pane">
    <div class="card p-3">Contact Admin Office</div>
  </div>
</div>
</div>

<div class="footer">© 2026 University Portal</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzI18rrFijjaUWCC-kjPEmZGMqBLy4fpMg2YVhRjiZj-5wbk9oUReILAN7qpMf3NCI/exec";

/* ---------------- INIT ---------------- */
document.addEventListener('DOMContentLoaded', async () => {

  const token = sessionStorage.getItem("token");

  if(token){
    dashboardPage.style.display = "block";
    await refreshStudent();
    switchTab("home");
  }else{
    loginPage.style.display = "block";
    loadSheets();
  }
});

/* ---------------- LOAD SHEETS ---------------- */
async function loadSheets(){
  const res = await fetch(WEB_APP_URL,{
    method:'POST',
    body: JSON.stringify({getSheets:true})
  });

  const data = await res.json();

  const sel = document.getElementById("sheet");
  sel.innerHTML = `<option value="">Select Course</option>`;

  (data.sheets || []).forEach(s=>{
    let o = document.createElement("option");
    o.value = s;
    o.textContent = s;
    sel.appendChild(o);
  });
}

/* ---------------- LOGIN ---------------- */
async function login(){

  const id = studentId.value.trim();
  const password = document.getElementById("password").value.trim();
  const sheet = document.getElementById("sheet").value;

  if(!id || !password || !sheet){
    loginMsg.textContent = "All fields required";
    return;
  }

  const res = await fetch(WEB_APP_URL,{
    method:'POST',
    body: JSON.stringify({
      action:"login",
      id,
      password,
      sheet,
      device: navigator.userAgent
    })
  });

  const data = await res.json();

  if(data.error){
    loginMsg.textContent = data.error;
    return;
  }

  sessionStorage.setItem("token", data.token);
  sessionStorage.setItem("student", JSON.stringify(data.student));

  loginPage.style.display = "none";
  dashboardPage.style.display = "block";

  showDashboard(data.student);

  if(data.firstLogin){
    showChange();
  }
}

/* ---------------- DASHBOARD ---------------- */
function showDashboard(student){
  const name = student["First Name"] || "";
  const father = student["Father Name"] || "";
  welcomeMsg.textContent = `Welcome, ${name} ${father}`;
}

/* ---------------- REFRESH ---------------- */
async function refreshStudent(){

  const token = sessionStorage.getItem("token");

  const res = await fetch(WEB_APP_URL,{
    method:'POST',
    body: JSON.stringify({
      action:"getStudent",
      token
    })
  });

  const data = await res.json();

  if(data.error){
    logout();
    return;
  }

  sessionStorage.setItem("student", JSON.stringify(data.student));
  showDashboard(data.student);
}

/* ---------------- CHANGE PASSWORD ---------------- */
async function changePassword(){

  const token = sessionStorage.getItem("token");

  const oldP = document.getElementById("oldPassword").value;
  const newP = document.getElementById("newPassword").value;
  const conf = document.getElementById("confirmPassword").value;

  if(!oldP || !newP || !conf){
    passMsg.textContent = "All fields required";
    return;
  }

  if(newP !== conf){
    passMsg.textContent = "Passwords do not match";
    return;
  }

  const res = await fetch(WEB_APP_URL,{
    method:'POST',
    body: JSON.stringify({
      action:"changePassword",
      token,
      currentPassword: oldP,
      newPassword: newP
    })
  });

  const data = await res.json();

  if(data.error){
    passMsg.textContent = data.error;
    return;
  }

  alert("Password updated successfully");

  changePage.style.display = "none";
  dashboardPage.style.display = "block";
}

/* ---------------- RESULTS ---------------- */
function loadResults(student){

  const table = document.getElementById("resultTable");
  table.innerHTML = "";

  const exclude = ["password","sheet","firstlogin"];

  const keys = Object.keys(student).filter(k=>{
    return !exclude.includes(k.toLowerCase());
  });

  let tr = document.createElement("tr");

  keys.forEach(k=>{
    let th = document.createElement("th");
    th.textContent = k;
    tr.appendChild(th);
  });

  table.appendChild(tr);

  let tr2 = document.createElement("tr");

  keys.forEach(k=>{
    let td = document.createElement("td");
    td.textContent = student[k] || "-";
    tr2.appendChild(td);
  });

  table.appendChild(tr2);
}

/* ---------------- TABS ---------------- */
document.querySelectorAll(".nav-link").forEach(t=>{
  t.onclick = ()=>switchTab(t.dataset.tab);
});

function switchTab(tab){

  document.querySelectorAll(".nav-link").forEach(t=>t.classList.remove("active"));
  document.querySelector(`[data-tab="${tab}"]`).classList.add("active");

  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("tab-active"));
  document.getElementById(tab).classList.add("tab-active");

  if(tab === "result"){
    const student = JSON.parse(sessionStorage.getItem("student"));
    loadResults(student);
  }
}

/* ---------------- LOGOUT ---------------- */
function logout(){
  sessionStorage.clear();
  location.reload();
}

/* ---------------- CHANGE PAGE ---------------- */
function showChange(){
  loginPage.style.display = "none";
  dashboardPage.style.display = "none";
  changePage.style.display = "block";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student LMS Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6f9;
}

/* LOGIN */
.login-box{
  max-width:400px;
  margin:80px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.hidden{display:none}

/* LMS LAYOUT */
.lms-container{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#182848;
  color:#fff;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

.sidebar h5{
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.side-link{
  padding:12px 18px;
  cursor:pointer;
}

.side-link:hover{
  background:#4b6cb7;
}

.side-link.active{
  background:#4b6cb7;
}

/* MAIN */
.main{
  flex:1;
  padding:15px;
  overflow:auto;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}

.menu-btn{
  font-size:22px;
  border:none;
  background:none;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100%;
    z-index:999;
  }
  .sidebar.show{
    left:0;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
  <h4 class="text-center">Student Login</h4>

  <input id="studentId" class="form-control mt-2" placeholder="Student ID">
  <input id="password" type="password" class="form-control mt-2" placeholder="Password">

  <select id="sheet" class="form-select mt-2"></select>

  <div id="loginMsg" class="text-danger mt-2"></div>

  <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
</div>

<!-- PASSWORD CHANGE -->
<div id="changePage" class="login-box hidden">
  <h4>Change Password</h4>

  <input id="oldPassword" type="password" class="form-control mt-2" placeholder="Old Password">
  <input id="newPassword" type="password" class="form-control mt-2" placeholder="New Password">
  <input id="confirmPassword" type="password" class="form-control mt-2" placeholder="Confirm Password">

  <div id="passMsg" class="text-danger mt-2"></div>

  <button class="btn btn-success w-100 mt-3" onclick="changePassword()">Update</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">

<div class="lms-container">

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">

    <h5>🎓 Student LMS</h5>

    <div class="side-link active" onclick="switchTab('home')">🏠 Home</div>
    <div class="side-link" onclick="switchTab('result')">📊 View Result</div>
    <div class="side-link" onclick="switchTab('about')">ℹ️ About</div>
    <div class="side-link" onclick="switchTab('contact')">📩 Contact</div>

    <button class="btn btn-light m-3" onclick="logout()">Logout</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h6 id="welcome"></h6>
    </div>

    <!-- PAGES -->
    <div id="home" class="tab-pane tab-active">
      <div class="card p-3">Welcome to Student LMS Portal 🎓</div>
    </div>

    <div id="result" class="tab-pane">
      <div class="card p-3">
        <table class="table table-bordered" id="table"></table>
      </div>
    </div>

    <div id="about" class="tab-pane">
      <div class="card p-3">This portal is for students to view results securely.</div>
    </div>

    <div id="contact" class="tab-pane">
      <div class="card p-3">Email: support@university.edu</div>
    </div>

  </div>
</div>
</div>

<script>
const API = "YOUR_WEB_APP_URL_HERE";

/* ---------- INIT ---------- */
document.addEventListener("DOMContentLoaded", loadSheets);

/* ---------- LOAD SHEETS ---------- */
async function loadSheets(){
  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({getSheets:true})
    });

    const data = await res.json();
    const sel = document.getElementById("sheet");

    sel.innerHTML = "<option>Select Course</option>";
    data.sheets?.forEach(s=>{
      let o = document.createElement("option");
      o.value = s;
      o.textContent = s;
      sel.appendChild(o);
    });

  }catch(e){
    loginMsg.textContent="Failed to load sheets";
  }
}

/* ---------- LOGIN ---------- */
async function login(){
  const id = studentId.value.trim();
  const password = document.getElementById("password").value.trim();
  const sheet = document.getElementById("sheet").value;

  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id,password,sheet})
    });

    const data = await res.json();

    if(data.error){
      loginMsg.textContent = data.error;
      return;
    }

    sessionStorage.setItem("student", JSON.stringify({...data.student, sheet}));

    if(data.firstLogin){
      showChange();
    }else{
      showDashboard(data.student);
    }

  }catch(e){
    loginMsg.textContent="Login failed";
  }
}

/* ---------- CHANGE PASSWORD ---------- */
async function changePassword(){
  const student = JSON.parse(sessionStorage.getItem("student"));

  const oldP = oldPassword.value.trim();
  const newP = newPassword.value.trim();
  const conf = confirmPassword.value.trim();

  if(newP !== conf){
    passMsg.textContent = "Passwords do not match";
    return;
  }

  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"changePassword",
      id: student["Student ID"] || student.StudentID,
      sheet: student.sheet,
      oldPassword: oldP,
      newPassword: newP
    })
  });

  const data = await res.json();

  if(data.error){
    passMsg.textContent = data.error;
    return;
  }

  sessionStorage.setItem("student", JSON.stringify(data.student));

  alert("Password updated successfully");
  showDashboard(data.student);
}

/* ---------- DASHBOARD ---------- */
function showDashboard(student){
  loginPage.classList.add("hidden");
  changePage.classList.add("hidden");
  dashboardPage.classList.remove("hidden");

  welcome.textContent = "Welcome " + (student["First Name"] || "");
}

/* ---------- SIDEBAR ---------- */
function switchTab(tab){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('tab-active'));
  document.getElementById(tab).classList.add('tab-active');

  document.querySelectorAll('.side-link').forEach(l=>l.classList.remove('active'));
  event.target.classList.add('active');

  if(tab === "result"){
    const student = JSON.parse(sessionStorage.getItem("student"));
    loadResults(student);
  }

  sidebar.classList.remove("show");
}

function toggleSidebar(){
  sidebar.classList.toggle("show");
}

/* ---------- RESULT TABLE ---------- */
function loadResults(student){
  const table = document.getElementById("table");
  table.innerHTML = "";

  Object.keys(student).forEach(k=>{
    let row = table.insertRow();
    row.insertCell(0).innerText = k;
    row.insertCell(1).innerText = student[k];
  });
}

/* ---------- LOGOUT ---------- */
function logout(){
  sessionStorage.clear();
  location.reload();
}

/* ---------- SHOW CHANGE ---------- */
function showChange(){
  loginPage.classList.add("hidden");
  changePage.classList.remove("hidden");
}
</script>

</body>
</html>

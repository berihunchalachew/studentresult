<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDU Student Result Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#4b6cb7,#182848);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HIDE ELEMENTS */
.hidden{ display:none !important; }

/* LOGIN BOX */
.login-box{
  max-width:400px;
  margin:80px auto;
  padding:30px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.login-icon{
  width:90px;
  display:block;
  margin:auto;
}

/* NAVBAR */
.navbar-custom{
  background:#182848;
}
.navbar-custom .nav-link{
  color:#fff !important;
  cursor:pointer;
}
.navbar-custom .nav-link.active{
  background:#4b6cb7;
  border-radius:5px;
}

/* DASHBOARD TABS */
.tab-pane{ display:none; }
.tab-active{ display:block; }
.card{ border-radius:10px; }

/* TABLE */
.table-bordered th, .table-bordered td {
  border: 1px solid #dee2e6 !important;
}
.table-striped tbody tr:nth-of-type(odd) {
  background-color: rgba(255,255,255,0.1);
}
.table-responsive { overflow-x:auto; }

/* FOOTER */
.footer{
  text-align:center;
  padding:10px;
  background:#fff;
  margin-top:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
  <img src="login.png" class="login-icon mb-3">
  <h4 class="text-center">Student Login</h4>
  <input id="studentId" class="form-control mt-3" placeholder="Student ID">
  <input id="password" type="password" class="form-control mt-2" placeholder="Password">
  <select id="sheet" class="form-select mt-2"></select>
  <div id="loginMsg" class="text-danger mt-2"></div>
  <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
</div>

<!-- CHANGE PASSWORD -->
<div id="changePage" class="login-box hidden">
  <h4 class="text-center">Change Password</h4>
  <input id="newPassword" type="password" class="form-control mt-3" placeholder="New Password">
  <input id="confirmPassword" type="password" class="form-control mt-2" placeholder="Confirm Password">
  <div id="passMsg" class="text-danger mt-2"></div>
  <button class="btn btn-success w-100 mt-3" onclick="changePassword()">Update Password</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <div class="d-flex align-items-center text-white">
      <img src="diredawa university.png" height="40" class="me-2">
      <strong>DDU Student Portal</strong>
    </div>
    <ul class="navbar-nav ms-auto" id="tabs">
      <li class="nav-item"><span class="nav-link active" data-tab="home">Home</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="result">Result</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="about">About</span></li>
      <li class="nav-item"><span class="nav-link" data-tab="contact">Contact</span></li>
      <li class="nav-item"><button class="btn btn-light btn-sm ms-2" onclick="logout()">Logout</button></li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
  <h5 id="welcomeMsg" class="text-white mb-3"></h5>

  <div id="home" class="tab-pane tab-active text-white">
    <div class="card p-3">Welcome to Student Result System</div>
  </div>

  <div id="result" class="tab-pane">
    <div class="card p-3 table-responsive">
      <table class="table table-bordered table-striped text-white" id="resultTable"></table>
    </div>
  </div>

  <div id="about" class="tab-pane">
    <div class="card p-3">This portal allows students to view results securely.</div>
  </div>

  <div id="contact" class="tab-pane">
    <div class="card p-3">Email: berihun.chalachew@ddu.edu.et</div>
  </div>
</div>
</div>

<div class="footer">© 2026 Dire Dawa University</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxMGwpHV8pLOZWxzmHRrxeFk35zw3QITeO9I3u3SxaWo85-0HSkSFxjCYGTEER8u7cu/exec";

// INIT
document.addEventListener('DOMContentLoaded', async ()=>{
  const student = JSON.parse(sessionStorage.getItem('student'));
  if(student){
    showDashboard(student);
  }else{
    await loadSheets();
  }
});

// LOAD SHEETS
async function loadSheets(){
  try {
    const res = await fetch(WEB_APP_URL,{
      method:'POST',
      body:JSON.stringify({getSheets:true})
    });
    const data = await res.json();
    const select=document.getElementById('sheet');
    select.innerHTML='<option value="">Select Course</option>';
    if(data.sheets){
      data.sheets.forEach(s=>{
        let o=document.createElement('option');
        o.value=s;
        o.textContent=s;
        select.appendChild(o);
      });
    }
  } catch(e){
    console.error(e);
    document.getElementById('loginMsg').textContent = "Failed to load sheets";
  }
}

// LOGIN
async function login(){
  const id = studentId.value.trim();
  const password = document.getElementById('password').value.trim();
  const sheet = document.getElementById('sheet').value;
  if(!id || !password || !sheet){ loginMsg.textContent="All fields required"; return; }

  try{
    const res = await fetch(WEB_APP_URL,{
      method:'POST',
      body:JSON.stringify({id,password,sheet})
    });
    const data = await res.json();
    if(data.error){ loginMsg.textContent=data.error; return; }

    sessionStorage.setItem('student', JSON.stringify({...data.student, sheet}));

    if(data.firstLogin){
      showChange();
    } else {
      showDashboard({...data.student, sheet});
    }
  } catch(e){
    console.error(e);
    loginMsg.textContent="Login failed";
  }
}

// CHANGE PASSWORD
async function changePassword(){
  const newP = document.getElementById('newPassword').value.trim();
  const conf = document.getElementById('confirmPassword').value.trim();

  const student = JSON.parse(sessionStorage.getItem('student'));

  // ❌ empty check
  if(!newP || !conf){
    document.getElementById('passMsg').textContent = "All fields required";
    return;
  }

  // ❌ length validation
  if(newP.length < 6){
    document.getElementById('passMsg').textContent = "Password must be at least 6 characters";
    return;
  }

  // ❌ match validation
  if(newP !== conf){
    document.getElementById('passMsg').textContent = "Passwords do not match";
    return;
  }
  

const student = JSON.parse(sessionStorage.getItem('student'));

console.log("STUDENT:", student);

if(!student){
  document.getElementById('passMsg').textContent = "Session expired. Please login again.";
  return;
}

const res = await fetch(WEB_APP_URL,{
  method:'POST',
  body: JSON.stringify({
    action:'changePassword',
    id: student["Student ID"] || student["StudentID"],
    newPassword: newP,
    sheet: student.sheet
  })
});
    const data = await res.json();

    if(data.error){
      document.getElementById('passMsg').textContent = data.error;
      return;
    }

    // ✅ SUCCESS
    sessionStorage.setItem('student', JSON.stringify({...student}));

    alert("Password updated successfully");
    showDashboard(student);

  } catch(e){
    console.error(e);
    document.getElementById('passMsg').textContent = "Failed to update password";
  }
}

// SHOW DASHBOARD
function showDashboard(student){
  loginPage.classList.add('hidden');
  changePage.classList.add('hidden');
  dashboardPage.classList.remove('hidden');

  const fname = student['First Name'] || student.StudentID;
  const father = student['Father Name'] || '';
  welcomeMsg.textContent = `Welcome, ${fname} ${father}`;

  switchTab('home');
}

// LOAD RESULT TABLE FOR SINGLE STUDENT
function loadResults(student){
  const table = document.getElementById('resultTable');
  table.innerHTML = '';

  if(!student || Object.keys(student).length === 0){
    table.innerHTML = `<tr><td>No data found</td></tr>`;
    return;
  }

  // 🔥 Normalize field names (important)
  const clean = key => key.toLowerCase().replace(/\s+/g,'');

  // ❌ Fields to exclude
  const exclude = ['password'];

  // ✅ Get dynamic headers safely
  const keys = Object.keys(student).filter(k => 
    !exclude.includes(clean(k))
  );

  if(keys.length === 0){
    table.innerHTML = `<tr><td>No result data found</td></tr>`;
    console.log("DEBUG student:", student);
    return;
  }

  // ✅ CREATE HEADER
  const thead = document.createElement('thead');
  const trHead = document.createElement('tr');

  keys.forEach(k=>{
    const th = document.createElement('th');
    th.textContent = k;
    trHead.appendChild(th);
  });

  thead.appendChild(trHead);
  table.appendChild(thead);

  // ✅ CREATE BODY
  const tbody = document.createElement('tbody');
  const tr = document.createElement('tr');

  keys.forEach(k=>{
    const td = document.createElement('td');

    let value = student[k];

    // 🔥 Handle empty / undefined
    if(value === null || value === undefined || value === ""){
      value = "-";
    }

    td.textContent = value;
    tr.appendChild(td);
  });

  tbody.appendChild(tr);
  table.appendChild(tbody);
}

// TAB SWITCH
document.querySelectorAll('#tabs .nav-link').forEach(tab=>{
  tab.onclick = ()=>switchTab(tab.dataset.tab);
});

function switchTab(tabName){
  document.querySelectorAll('.nav-link').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('tab-active'));
  document.getElementById(tabName).classList.add('tab-active');

  if(tabName==='result'){
    const student = JSON.parse(sessionStorage.getItem('student'));
    loadResults(student);
  }
}

// LOGOUT
function logout(){
  sessionStorage.clear();
  location.reload();
}

// SHOW CHANGE PASSWORD PAGE
function showChange(){
  loginPage.classList.add('hidden');
  changePage.classList.remove('hidden');
}
</script>

</body>
</html>
